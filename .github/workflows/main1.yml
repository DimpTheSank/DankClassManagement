name: Wake up Streamlit

on:
  schedule:
    - cron: '0 */6 * * *' # Chạy mỗi 12 tiếng
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Open Streamlit App
        run: npx playwright codegen --target javascript -o /dev/null https://your-app.streamlit.app --timeout 60000
